<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Quiz Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    body { background: #060612; min-height: 100vh; overflow-x: hidden; }

    .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: float 12s ease-in-out infinite; pointer-events: none; z-index: 0; }
    .bg-orb-1 { width: 500px; height: 500px; background: #6366f1; top: -100px; left: -100px; animation-delay: 0s; }
    .bg-orb-2 { width: 400px; height: 400px; background: #8b5cf6; top: 40%; right: -80px; animation-delay: -4s; }
    .bg-orb-3 { width: 350px; height: 350px; background: #3b82f6; bottom: -80px; left: 30%; animation-delay: -8s; }
    @keyframes float { 0%,100% { transform: translateY(0px) scale(1); } 33% { transform: translateY(-30px) scale(1.05); } 66% { transform: translateY(15px) scale(0.97); } }

    .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06); }
    .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.07); box-shadow: 0 4px 24px rgba(0,0,0,0.3); }

    .grad-text { background: linear-gradient(135deg, #a5b4fc 0%, #818cf8 40%, #c4b5fd 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .btn-glow { background: linear-gradient(135deg, #6366f1, #8b5cf6); box-shadow: 0 0 20px rgba(99,102,241,0.4), 0 4px 15px rgba(0,0,0,0.3); transition: all 0.25s ease; position: relative; overflow: hidden; }
    .btn-glow::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); transition: left 0.5s ease; }
    .btn-glow:hover::before { left: 100%; }
    .btn-glow:hover { box-shadow: 0 0 35px rgba(99,102,241,0.6), 0 6px 20px rgba(0,0,0,0.4); transform: translateY(-2px); }
    .btn-glow:active { transform: translateY(0); }
    .btn-glow:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    .step-active { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
    .step-done { background: rgba(99,102,241,0.2); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }
    .step-idle { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.06); }
    .step-connector-done { background: linear-gradient(90deg, #6366f1, #8b5cf6); }
    .step-connector-idle { background: rgba(255,255,255,0.07); }

    .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.15); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fade-in { animation: fadeIn 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 999px; background: rgba(255,255,255,0.08); outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); cursor: pointer; box-shadow: 0 0 10px rgba(99,102,241,0.6); transition: transform 0.15s; }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 4px; }

    .option-btn { width: 100%; text-align: left; display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.75); font-size: 14px; cursor: pointer; transition: all 0.2s ease; }
    .option-btn:hover:not(:disabled) { border-color: rgba(99,102,241,0.4); background: rgba(99,102,241,0.08); color: white; }
    .option-btn.selected { border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.12); color: white; }
    .option-btn.correct { border-color: rgba(34,197,94,0.5); background: rgba(34,197,94,0.1); color: #86efac; }
    .option-btn.wrong { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.08); color: rgba(252,165,165,0.8); }
    .option-btn.dimmed { opacity: 0.4; }

    .upload-zone { border: 2px dashed rgba(255,255,255,0.1); border-radius: 16px; transition: all 0.25s ease; background: rgba(255,255,255,0.02); cursor: pointer; }
    .upload-zone:hover, .upload-zone.dragging { border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.06); box-shadow: inset 0 0 30px rgba(99,102,241,0.05); }

    .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; }
    .num-questions-box { background: rgba(99,102,241,0.4); border: 1px solid rgba(99,102,241,0.5); color: #ffffff !important; -webkit-text-fill-color: #ffffff !important; text-shadow: 0 0 8px rgba(0,0,0,0.5); }
    .pill-purple { background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.25); }
    .pill-green  { background: rgba(34,197,94,0.12);  color: #86efac; border: 1px solid rgba(34,197,94,0.25); }
    .pill-amber  { background: rgba(245,158,11,0.12); color: #fcd34d; border: 1px solid rgba(245,158,11,0.25); }
    .pill-red    { background: rgba(239,68,68,0.12);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
  </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useRef } = React;

// ─── Upload Section ───────────────────────────────────────────────────────────
function UploadSection({ onUploaded }) {
  const [dragging, setDragging] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [progress, setProgress] = useState('');
  const inputRef = useRef();

  const processFile = async (file) => {
    setError(null);
    if (!file.name.match(/\.(pdf|txt|docx)$/i)) { setError('Please upload a PDF, TXT, or DOCX file.'); return; }
    if (file.size > 5 * 1024 * 1024) { setError('File must be smaller than 5 MB.'); return; }
    setLoading(true); setProgress('Parsing document…');
    try {
      const formData = new FormData();
      formData.append('file', file);
      setTimeout(() => setProgress('Generating embeddings…'), 1200);
      const res = await fetch('/api/upload', { method: 'POST', body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Upload failed.');
      setProgress('');
      onUploaded({ ...data, file });
    } catch (e) { setError(e.message); } finally { setLoading(false); }
  };

  const onDrop = useCallback((e) => {
    e.preventDefault(); setDragging(false);
    if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
  }, []);

  return (
    <div className="space-y-5 fade-in">
      <div className="text-center space-y-2 pb-2">
        <div className="w-14 h-14 mx-auto rounded-2xl flex items-center justify-center text-2xl mb-3"
          style={{background:'linear-gradient(135deg,rgba(99,102,241,0.3),rgba(139,92,246,0.3))',border:'1px solid rgba(99,102,241,0.3)'}}>📄</div>
        <h2 className="text-xl font-bold text-white">Upload Your Document</h2>
        <p className="text-sm" style={{color:'rgba(255,255,255,0.4)'}}>We'll extract, chunk, and embed it — all in-memory</p>
      </div>

      <div className={`upload-zone flex flex-col items-center justify-center h-44 ${dragging ? 'dragging' : ''}`}
        onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={onDrop}
        onClick={() => !loading && inputRef.current?.click()}>
        {loading ? (
          <div className="flex flex-col items-center gap-3">
            <div className="spinner" style={{width:28,height:28,borderTopColor:'#818cf8'}}></div>
            <p className="text-sm font-medium" style={{color:'#a5b4fc'}}>{progress}</p>
          </div>
        ) : (
          <div className="flex flex-col items-center gap-3 pointer-events-none">
            <div className="text-3xl opacity-60">☁️</div>
            <div className="text-center">
              <p className="text-sm font-medium text-white">Drop file here or <span style={{color:'#a5b4fc'}}>browse</span></p>
              <p className="text-xs mt-1" style={{color:'rgba(255,255,255,0.3)'}}>PDF · TXT · DOCX · Max 5 MB</p>
            </div>
          </div>
        )}
        <input ref={inputRef} type="file" className="hidden" accept=".pdf,.txt,.docx"
          onChange={e => e.target.files[0] && processFile(e.target.files[0])} />
      </div>

      {error && (
        <div className="slide-up flex items-start gap-3 px-4 py-3 rounded-xl"
          style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)'}}>
          <span className="text-red-400 text-sm mt-0.5">⚠</span>
          <p className="text-red-400 text-sm">{error}</p>
        </div>
      )}
      <div className="flex flex-wrap gap-2 justify-center">
        {['RAG Pipeline','In-memory only','Stateless'].map(t => (
          <span key={t} className="pill pill-purple">{t}</span>
        ))}
      </div>
    </div>
  );
}

// ─── Quiz Config ──────────────────────────────────────────────────────────────
function QuizConfig({ uploadData, onQuizGenerated }) {
  const [numQ, setNumQ] = useState(5);
  const [difficulty, setDifficulty] = useState('Medium');
  const [qType, setQType] = useState('mcq');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const difficultyConfig = {
    Easy:   { icon: '🟢', desc: 'Basic recall & understanding' },
    Medium: { icon: '🟡', desc: 'Applied knowledge & analysis' },
    Hard:   { icon: '🔴', desc: 'Deep reasoning & evaluation' },
  };
  const typeConfig = [
    { value: 'mcq',         icon: '◉', label: 'Multiple Choice', desc: '4 options · correct answer · explanation' },
    { value: 'descriptive', icon: '✍', label: 'Descriptive',     desc: 'Open-ended · key points provided' },
    { value: 'mixed',       icon: '⚡', label: 'Mixed',           desc: 'Best of both formats combined' },
  ];

  const handleGenerate = async () => {
    setError(null); setLoading(true);
    try {
      const res = await fetch('/api/generate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vector_store: uploadData.vector_store, num_questions: numQ, difficulty, question_type: qType }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Generation failed.');
      onQuizGenerated(data, { numQ, difficulty, qType });
    } catch (e) { setError(e.message); } finally { setLoading(false); }
  };

  return (
    <div className="space-y-6 fade-in">
      <div className="flex items-center gap-3 px-4 py-3 rounded-xl"
        style={{background:'rgba(34,197,94,0.07)',border:'1px solid rgba(34,197,94,0.2)'}}>
        <div className="w-8 h-8 rounded-lg flex items-center justify-center text-sm" style={{background:'rgba(34,197,94,0.15)'}}>✓</div>
        <div className="flex-1 min-w-0">
          <p className="text-sm font-medium text-white truncate">{uploadData.filename}</p>
          <p className="text-xs" style={{color:'rgba(255,255,255,0.4)'}}>{uploadData.chunk_count} chunks indexed · ready to quiz</p>
        </div>
        <span className="pill pill-green shrink-0">Indexed</span>
      </div>

      <div className="glass-card rounded-2xl p-5 space-y-4">
        <div className="flex items-center justify-between">
          <div>
            <p className="text-sm font-semibold text-white">Number of Questions</p>
            <p className="text-xs mt-0.5" style={{color:'rgba(255,255,255,0.35)'}}>Slide to pick how many to generate</p>
          </div>
      <div className="num-questions-box w-12 h-12 rounded-xl flex items-center justify-center font-bold text-lg">
         {numQ}
        </div>
        </div>
        <input type="range" min="1" max="20" value={numQ} onChange={e => setNumQ(+e.target.value)} />
        <div className="flex justify-between text-xs" style={{color:'rgba(255,255,255,0.25)'}}>
          <span>1 min</span><span>10</span><span>20 max</span>
        </div>
      </div>

      <div className="glass-card rounded-2xl p-5 space-y-3">
        <p className="text-sm font-semibold text-white">Difficulty Level</p>
        <div className="grid grid-cols-3 gap-2">
          {Object.entries(difficultyConfig).map(([d, cfg]) => (
            <button key={d} onClick={() => setDifficulty(d)}
              className={`py-3 rounded-xl text-sm font-medium transition-all flex flex-col items-center gap-1 ${difficulty===d ? 'text-white shadow-lg' : 'text-white/40 hover:text-white/70'}`}
              style={difficulty===d
                ? {background: d==='Easy'?'rgba(34,197,94,0.2)':d==='Medium'?'rgba(245,158,11,0.2)':'rgba(239,68,68,0.2)', border:`1px solid ${d==='Easy'?'rgba(34,197,94,0.4)':d==='Medium'?'rgba(245,158,11,0.4)':'rgba(239,68,68,0.4)'}`}
                : {background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)'}}>
              <span className="text-lg">{cfg.icon}</span><span>{d}</span>
            </button>
          ))}
        </div>
        {difficulty && <p className="text-xs text-center" style={{color:'rgba(255,255,255,0.35)'}}>{difficultyConfig[difficulty].desc}</p>}
      </div>

      <div className="glass-card rounded-2xl p-5 space-y-3">
        <p className="text-sm font-semibold text-white">Question Format</p>
        <div className="space-y-2">
          {typeConfig.map(opt => (
            <button key={opt.value} onClick={() => setQType(opt.value)}
              className="w-full flex items-center gap-4 px-4 py-3.5 rounded-xl transition-all text-left"
              style={qType===opt.value
                ? {background:'rgba(99,102,241,0.12)',border:'1px solid rgba(99,102,241,0.35)'}
                : {background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.06)'}}>
              <div className="w-9 h-9 rounded-xl flex items-center justify-center text-base shrink-0"
                style={{background:qType===opt.value?'rgba(99,102,241,0.2)':'rgba(255,255,255,0.04)'}}>
                {opt.icon}
              </div>
              <div className="flex-1">
                <p className={`text-sm font-medium ${qType===opt.value?'text-white':'text-white/50'}`}>{opt.label}</p>
                <p className="text-xs mt-0.5" style={{color:'rgba(255,255,255,0.25)'}}>{opt.desc}</p>
              </div>
              <div className="w-4 h-4 rounded-full border-2 shrink-0 flex items-center justify-center"
                style={qType===opt.value?{borderColor:'#818cf8',background:'#818cf8'}:{borderColor:'rgba(255,255,255,0.15)'}}>
                {qType===opt.value && <div className="w-1.5 h-1.5 rounded-full bg-white"></div>}
              </div>
            </button>
          ))}
        </div>
      </div>

      {error && (
        <div className="slide-up flex items-start gap-3 px-4 py-3 rounded-xl"
          style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)'}}>
          <span className="text-red-400 text-sm">⚠</span>
          <p className="text-red-400 text-sm">{error}</p>
        </div>
      )}

      <button onClick={handleGenerate} disabled={loading}
        className="btn-glow w-full py-4 rounded-2xl text-white font-semibold text-sm flex items-center justify-center gap-2.5">
        {loading
          ? <><div className="spinner"></div><span>Generating your quiz…</span></>
          : <><span>✨</span><span>Generate Quiz</span><span className="opacity-60 text-xs">({numQ} {difficulty} {qType} questions)</span></>}
      </button>
    </div>
  );
}

// ─── MCQ Card ─────────────────────────────────────────────────────────────────
function MCQCard({ q, globalIndex }) {
  const [revealed, setRevealed] = useState(false);
  const [selected, setSelected] = useState(null);

  const getOptionClass = (key) => {
    if (!revealed && selected !== key) return '';
    if (!revealed && selected === key) return 'selected';
    if (key === q.correct_answer) return 'correct';
    if (key === selected && key !== q.correct_answer) return 'wrong';
    return 'dimmed';
  };

  return (
    <div className="glass-card rounded-2xl p-5 space-y-4 fade-in">
      <div className="flex gap-3">
        <div className="shrink-0 w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold"
          style={{background:'linear-gradient(135deg,rgba(99,102,241,0.4),rgba(139,92,246,0.4))',color:'#c4b5fd'}}>
          {globalIndex + 1}
        </div>
        <p className="text-sm text-white leading-relaxed font-medium">{q.question}</p>
      </div>
      <div className="space-y-2 pl-10">
        {Object.entries(q.options).map(([key, val]) => (
          <button key={key} className={`option-btn ${getOptionClass(key)}`} disabled={revealed} onClick={() => setSelected(key)}>
            <span className="text-xs font-bold shrink-0 mt-0.5 w-4"
              style={{color:getOptionClass(key)==='correct'?'#86efac':'rgba(255,255,255,0.3)'}}>{key}</span>
            <span>{val}</span>
          </button>
        ))}
      </div>
      <div className="pl-10">
        {!revealed ? (
          <button onClick={() => setRevealed(true)} className="text-xs font-medium transition-all"
            style={{color:'rgba(165,180,252,0.6)'}}>👁 Reveal Answer</button>
        ) : (
          <div className="slide-up rounded-xl p-3 space-y-1.5"
            style={{background:'rgba(34,197,94,0.06)',border:'1px solid rgba(34,197,94,0.15)'}}>
            <p className="text-xs font-semibold" style={{color:'#86efac'}}>✓ Correct: {q.correct_answer}</p>
            {q.explanation && <p className="text-xs leading-relaxed" style={{color:'rgba(255,255,255,0.5)'}}>{q.explanation}</p>}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Descriptive Card ─────────────────────────────────────────────────────────
function DescriptiveCard({ q, globalIndex }) {
  const [expanded, setExpanded] = useState(false);
  return (
    <div className="glass-card rounded-2xl p-5 space-y-4 fade-in">
      <div className="flex gap-3">
        <div className="shrink-0 w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold"
          style={{background:'linear-gradient(135deg,rgba(139,92,246,0.4),rgba(168,85,247,0.4))',color:'#d8b4fe'}}>
          {globalIndex + 1}
        </div>
        <p className="text-sm text-white leading-relaxed font-medium">{q.question}</p>
      </div>
      <div className="pl-10">
        <button onClick={() => setExpanded(!expanded)}
          className="text-xs font-medium transition-all flex items-center gap-1.5"
          style={{color:'rgba(196,181,253,0.6)'}}>
          <span style={{transform:expanded?'rotate(90deg)':'none',display:'inline-block',transition:'transform 0.2s'}}>▶</span>
          {expanded ? 'Hide Key Points' : 'Show Key Points'}
        </button>
        {expanded && q.expected_points?.length > 0 && (
          <div className="mt-3 space-y-2 slide-up">
            {q.expected_points.map((pt, i) => (
              <div key={i} className="flex items-start gap-2.5">
                <div className="w-1.5 h-1.5 rounded-full mt-1.5 shrink-0" style={{background:'#a78bfa'}}></div>
                <p className="text-xs leading-relaxed" style={{color:'rgba(255,255,255,0.55)'}}>{pt}</p>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── PDF Generator ────────────────────────────────────────────────────────────
function generatePDF(quiz, meta) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const PW = 210, PH = 297, M = 18, CW = PW - M * 2;
  let y = M;

  const newPage = () => { doc.addPage(); y = M; };
  const checkY = (need = 10) => { if (y + need > PH - M) newPage(); };

  const writeLine = (text, size, r, g, b, bold = false, indent = 0) => {
    doc.setFontSize(size);
    doc.setTextColor(r, g, b);
    doc.setFont('helvetica', bold ? 'bold' : 'normal');
    const lines = doc.splitTextToSize(text, CW - indent);
    checkY(lines.length * (size * 0.45) + 4);
    doc.text(lines, M + indent, y);
    y += lines.length * (size * 0.45) + 4;
  };

  const divider = (r = 200, g = 200, b = 200) => {
    checkY(6);
    doc.setDrawColor(r, g, b);
    doc.setLineWidth(0.3);
    doc.line(M, y, PW - M, y);
    y += 6;
  };

  // ── White background ──
  doc.setFillColor(255, 255, 255);
  doc.rect(0, 0, PW, PH, 'F');

  // ── Title ──
  writeLine('AI Quiz Assistant', 20, 30, 30, 30, true);
  writeLine(`Generated on ${new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })}`, 9, 120, 120, 120);
  writeLine(`Difficulty: ${meta.difficulty}   |   Format: ${meta.qType.toUpperCase()}   |   Questions: ${meta.numQ}`, 9, 120, 120, 120);
  y += 2;
  divider(180, 180, 180);

  const mcqs  = quiz.type === 'mcq'  ? quiz.questions : (quiz.type === 'mixed' ? quiz.mcqs : []);
  const descs = quiz.type === 'descriptive' ? quiz.questions : (quiz.type === 'mixed' ? quiz.descriptive : []);
  let qNum = 0;

  // ── MCQs ──
  if (mcqs?.length > 0) {
    if (quiz.type === 'mixed') {
      writeLine('MULTIPLE CHOICE QUESTIONS', 11, 60, 60, 60, true);
      y += 2;
    }

    mcqs.forEach((q) => {
      qNum++;
      checkY(15);

      // Question
      writeLine(`Q${qNum}. ${q.question}`, 10.5, 20, 20, 20, true);

      // Options
      Object.entries(q.options).forEach(([key, val]) => {
        const isCorrect = key === q.correct_answer;
        writeLine(
          `${isCorrect ? '✓' : ' '} ${key}.  ${val}`,
          10, isCorrect ? 30 : 60, isCorrect ? 130 : 60, isCorrect ? 60 : 60,
          isCorrect, 4
        );
      });

      // Answer + explanation
      y += 1;
      writeLine(`Answer: ${q.correct_answer}`, 9.5, 30, 130, 60, true, 4);
      if (q.explanation) {
        writeLine(`Explanation: ${q.explanation}`, 9, 100, 100, 100, false, 4);
      }
      y += 3;
      divider(220, 220, 220);
    });
  }

  // ── Descriptive ──
  if (descs?.length > 0) {
    if (quiz.type === 'mixed') {
      y += 2;
      writeLine('DESCRIPTIVE QUESTIONS', 11, 60, 60, 60, true);
      y += 2;
    }

    descs.forEach((q) => {
      qNum++;
      checkY(15);

      writeLine(`Q${qNum}. ${q.question}`, 10.5, 20, 20, 20, true);

      if (q.expected_points?.length > 0) {
        y += 1;
        writeLine('Key Points:', 9.5, 80, 80, 80, true, 4);
        q.expected_points.forEach((pt, i) => {
          writeLine(`${i + 1}.  ${pt}`, 9.5, 60, 60, 60, false, 8);
        });
      }
      y += 3;
      divider(220, 220, 220);
    });
  }

  // ── Footer on every page ──
  const totalPages = doc.getNumberOfPages();
  for (let i = 1; i <= totalPages; i++) {
    doc.setPage(i);
    doc.setDrawColor(200, 200, 200); doc.setLineWidth(0.3);
    doc.line(M, PH - 14, PW - M, PH - 14);
    doc.setFontSize(7.5); doc.setFont('helvetica', 'normal'); doc.setTextColor(160, 160, 160);
    doc.text('Generated by AI Quiz Assistant · Powered by Gemini 2.5 Flash', M, PH - 8);
    doc.text(`Page ${i} / ${totalPages}`, PW - M - 18, PH - 8);
  }

  doc.save(`quiz-${meta.difficulty.toLowerCase()}-${meta.qType}-${Date.now()}.pdf`);
}

// ─── Plain Text Generator ────────────────────────────────────────────────────
function generatePlainText(quiz, meta) {
  const mcqs  = quiz.type === 'mcq'  ? quiz.questions : (quiz.type === 'mixed' ? quiz.mcqs : []);
  const descs = quiz.type === 'descriptive' ? quiz.questions : (quiz.type === 'mixed' ? quiz.descriptive : []);
  const total = (mcqs?.length || 0) + (descs?.length || 0);
  
  let text = '';
  
  // Header
  text += '='.repeat(70) + '\n';
  text += 'AI QUIZ ASSISTANT\n';
  text += '='.repeat(70) + '\n\n';
  text += `Generated on: ${new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' })}\n`;
  text += `Difficulty: ${meta.difficulty}  |  Format: ${meta.qType.toUpperCase()}  |  Questions: ${total}\n`;
  text += '='.repeat(70) + '\n\n';
  
  let qNum = 0;
  
  // Multiple Choice Questions
  if (mcqs?.length > 0) {
    if (quiz.type === 'mixed') {
      text += 'MULTIPLE CHOICE QUESTIONS\n';
      text += '-'.repeat(70) + '\n\n';
    }
    
    mcqs.forEach((q) => {
      qNum++;
      text += `Q${qNum}. ${q.question}\n\n`;
      
      // Options
      Object.entries(q.options).forEach(([key, val]) => {
        const isCorrect = key === q.correct_answer;
        text += `   ${key}. ${val}${isCorrect ? ' ✓ (Correct)' : ''}\n`;
      });
      
      text += `\n   Answer: ${q.correct_answer}\n`;
      if (q.explanation) {
        text += `   Explanation: ${q.explanation}\n`;
      }
      text += '\n' + '-'.repeat(70) + '\n\n';
    });
  }
  
  // Descriptive Questions
  if (descs?.length > 0) {
    if (quiz.type === 'mixed') {
      text += '\nDESCRIPTIVE QUESTIONS\n';
      text += '-'.repeat(70) + '\n\n';
    }
    
    descs.forEach((q) => {
      qNum++;
      text += `Q${qNum}. ${q.question}\n\n`;
      
      if (q.expected_points?.length > 0) {
        text += '   Key Points to Cover:\n';
        q.expected_points.forEach((pt, i) => {
          text += `   ${i + 1}. ${pt}\n`;
        });
      }
      text += '\n' + '-'.repeat(70) + '\n\n';
    });
  }
  
  // Footer
  text += '\n' + '='.repeat(70) + '\n';
  text += 'Generated by AI Quiz Assistant · Powered by Gemini 2.5 Flash · RAG Pipeline\n';
  text += '='.repeat(70) + '\n';
  
  // Create and download text file
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `quiz-${meta.difficulty.toLowerCase()}-${meta.qType}-${Date.now()}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─── Quiz Display ─────────────────────────────────────────────────────────────
function QuizDisplay({ quiz, meta, onReset, onRegenerate }) {
  const [downloadingText, setDownloadingText] = useState(false);
  const mcqs  = quiz.type === 'mcq'  ? quiz.questions : (quiz.type === 'mixed' ? quiz.mcqs        : []);
  const descs = quiz.type === 'descriptive' ? quiz.questions : (quiz.type === 'mixed' ? quiz.descriptive : []);
  const total = (mcqs?.length || 0) + (descs?.length || 0);

  const handleDownloadText = () => {
    setDownloadingText(true);
    try { generatePlainText(quiz, meta); }
    catch(e) { alert('Text generation failed: ' + e.message); }
    finally { setTimeout(() => setDownloadingText(false), 500); }
  };

  return (
    <div className="space-y-5 fade-in">
      {/* Header */}
      <div className="glass rounded-2xl p-5">
        <div className="flex items-start justify-between gap-4">
          <div>
            <h2 className="text-lg font-bold text-white">Your Quiz is Ready</h2>
            <p className="text-xs mt-1" style={{color:'rgba(255,255,255,0.4)'}}>Generated from your document via RAG</p>
          </div>
          <button onClick={onReset} className="shrink-0 text-xs px-3 py-1.5 rounded-xl transition-all"
            style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',color:'rgba(255,255,255,0.5)'}}>
            ← New Quiz
          </button>
        </div>
        <div className="flex flex-wrap gap-2 mt-4">
          <span className="pill pill-purple">📝 {total} Questions</span>
          <span className={`pill ${meta.difficulty==='Easy'?'pill-green':meta.difficulty==='Medium'?'pill-amber':'pill-red'}`}>
            {meta.difficulty==='Easy'?'🟢':meta.difficulty==='Medium'?'🟡':'🔴'} {meta.difficulty}
          </span>
          <span className="pill pill-purple">
            {meta.qType==='mcq'?'◉ MCQ':meta.qType==='descriptive'?'✍ Descriptive':'⚡ Mixed'}
          </span>
          {mcqs?.length > 0 && descs?.length > 0 && (
            <span className="pill" style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',color:'rgba(255,255,255,0.4)',fontSize:11}}>
              {mcqs.length} MCQ · {descs.length} Descriptive
            </span>
          )}
        </div>
      </div>

      {/* MCQs */}
      {mcqs?.length > 0 && (
        <div className="space-y-3">
          {quiz.type === 'mixed' && <p className="text-xs font-semibold uppercase tracking-widest px-1" style={{color:'#a5b4fc'}}>Multiple Choice</p>}
          {mcqs.map((q, i) => <MCQCard key={i} q={q} globalIndex={i} />)}
        </div>
      )}

      {/* Descriptive */}
      {descs?.length > 0 && (
        <div className="space-y-3">
          {quiz.type === 'mixed' && <p className="text-xs font-semibold uppercase tracking-widest px-1 mt-2" style={{color:'#c4b5fd'}}>Descriptive</p>}
          {descs.map((q, i) => <DescriptiveCard key={i} q={q} globalIndex={(mcqs?.length||0) + i} />)}
        </div>
      )}

      {/* Actions */}
      <div className="space-y-3 pt-2">
        <div className="flex gap-3">
          <button onClick={onRegenerate}
            className="flex-1 py-3 rounded-xl text-sm font-medium transition-all"
            style={{background:'rgba(99,102,241,0.1)',border:'1px solid rgba(99,102,241,0.25)',color:'#a5b4fc'}}>
            🔄 Regenerate
          </button>
          <button onClick={onReset}
            className="flex-1 py-3 rounded-xl text-sm font-medium transition-all"
            style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',color:'rgba(255,255,255,0.5)'}}>
            📄 New Doc
          </button>
        </div>
        <button onClick={handleDownloadText} disabled={downloadingText}
          className="w-full py-3 rounded-xl text-sm font-medium transition-all flex items-center justify-center gap-2"
          style={{background:'rgba(59,130,246,0.1)',border:'1px solid rgba(59,130,246,0.25)',color:'#93c5fd',opacity:downloadingText?0.7:1}}>
          {downloadingText ? <><div className="spinner" style={{width:14,height:14,borderTopColor:'#93c5fd'}}></div> <span>Saving…</span></> : '📝 Download Text'}
        </button>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [step, setStep] = useState('upload');
  const [uploadData, setUploadData] = useState(null);
  const [quiz, setQuiz] = useState(null);
  const [quizMeta, setQuizMeta] = useState(null);

  const steps = [
    { key: 'upload', label: 'Upload',    icon: '📄' },
    { key: 'config', label: 'Configure', icon: '⚙️' },
    { key: 'quiz',   label: 'Quiz',      icon: '🎯' },
  ];
  const stepIndex = steps.findIndex(s => s.key === step);

  return (
    <div className="relative z-10 min-h-screen flex flex-col items-center py-10 px-4">
      <div className="w-full max-w-xl">

        <div className="text-center mb-8 space-y-3">
          <div className="inline-flex items-center gap-2 pill pill-purple mb-1">
            <span>⚡</span> Gemini 2.5 Flash · RAG Pipeline
          </div>
          <h1 className="text-4xl font-extrabold tracking-tight">
            <span className="grad-text">AI Quiz</span><span className="text-white"> Assistant</span>
          </h1>
          <p className="text-sm" style={{color:'rgba(255,255,255,0.35)'}}>Upload any document · get a tailored quiz in seconds</p>
        </div>

        <div className="flex items-center justify-center mb-6">
          {steps.map((s, i) => (
            <React.Fragment key={s.key}>
              <div className={`flex items-center gap-2 px-4 py-2 rounded-full text-xs font-semibold transition-all
                ${i===stepIndex?'step-active':i<stepIndex?'step-done':'step-idle'}`}>
                <span>{s.icon}</span>
                <span className="hidden sm:inline">{s.label}</span>
              </div>
              {i < steps.length - 1 && (
                <div className={`h-px w-8 mx-1 ${i<stepIndex?'step-connector-done':'step-connector-idle'}`} />
              )}
            </React.Fragment>
          ))}
        </div>

        <div className="glass rounded-3xl p-6 shadow-2xl"
          style={{boxShadow:'0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06)'}}>
          {step==='upload' && <UploadSection onUploaded={(data) => { setUploadData(data); setStep('config'); }} />}
          {step==='config' && <QuizConfig uploadData={uploadData} onQuizGenerated={(data, meta) => { setQuiz(data); setQuizMeta(meta); setStep('quiz'); }} />}
          {step==='quiz'   && <QuizDisplay quiz={quiz} meta={quizMeta} onReset={() => { setStep('upload'); setUploadData(null); setQuiz(null); }} onRegenerate={() => setStep('config')} />}
        </div>

        <p className="text-center text-xs mt-5" style={{color:'rgba(255,255,255,0.18)'}}>
          🔒 No data stored · Fully stateless · Files processed in-memory only
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
